<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counterfeit Medicine Detection - Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo">🛡️ MedicineVerify</h1>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Scanner</a></li>
                <li><a href="dashboard.html" class="nav-link active">Dashboard</a></li>
                <li><a href="map.html" class="nav-link">Map</a></li>
                <li><a href="history.html" class="nav-link">History</a></li>
            </ul>
        </div>
    </nav>

    <main class="dashboard-page">
        <div class="container">
            <h2>📊 Detection Dashboard</h2>
            <div class="stats-grid">
                <div class="stat-card genuine">
                    <h3 id="total-scans">0</h3>
                    <p>Total Scans</p>
                </div>
                <div class="stat-card genuine">
                    <h3 id="genuine-count">0</h3>
                    <p>Genuine</p>
                </div>
                <div class="stat-card fake">
                    <h3 id="fake-count">0</h3>
                    <p>Fake Detected</p>
                </div>
            </div>

            <div class="chart-container">
                <canvas id="statsChart"></canvas>
            </div>

            <div class="recent-scans">
                <h3>Recent Scans</h3>
                <div id="scans-table">
                    <p>Loading...</p>
                </div>
            </div>
        </div>
    </main>

    <script src="js/dashboard.js"></script>
</body>
</html>
