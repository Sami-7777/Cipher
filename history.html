<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counterfeit Medicine Detection - History</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo">🛡️ MedicineVerify</h1>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Scanner</a></li>
                <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
                <li><a href="map.html" class="nav-link">Map</a></li>
                <li><a href="history.html" class="nav-link active">History</a></li>
            </ul>
        </div>
    </nav>

    <main class="history-page">
        <div class="container">
            <h2>📋 Scan History</h2>
            <div class="stats-grid" style="grid-template-columns: 1fr;">
                <div class="stat-card">
                    <h3 id="total-history">0</h3>
                    <p>Total Scans Saved</p>
                </div>
            </div>
            
            <div class="recent-scans">
                <h3>Last 50 Scans</h3>
                <div id="history-table">
                    <p>Loading history...</p>
                </div>
            </div>
            
            <div style="text-align: center; margin-top: 2rem;">
                <button id="clear-history" class="btn" style="background: #ef4444;">Clear All History</button>
            </div>
        </div>
    </main>

    <script src="js/history.js"></script>
</body>
</html>
